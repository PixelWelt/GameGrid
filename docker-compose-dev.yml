services:
  game-grid:
    container_name: game-grid
    build:
      context: .
      dockerfile: dockerfile
    expose:
      - "8000"
    volumes:
      - ./app/static:/app/static
    restart: no
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./app/static:/app/static
    depends_on:
      - game-grid
    restart: always
